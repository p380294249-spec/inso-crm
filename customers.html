<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSO CRM — 客户列表</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="nav.js"></script>
<style>
  :root {
    --bg: #0d0f11;
    --surface: #141618;
    --surface2: #1a1c1f;
    --border: #242628;
    --border-active: #3a7bd5;
    --text: #e8eaed;
    --text-dim: #6b7280;
    --text-muted: #374151;
    --accent: #3a7bd5;
    --accent-dim: rgba(58,123,213,0.12);
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans SC', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    padding: 24px 16px 60px;
    max-width: 960px;
    margin: 0 auto;
  }

  /* ── 工具栏 ── */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 9px 12px 9px 36px;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.15s;
  }
  .search-box input:focus { border-color: var(--border-active); }
  .search-box input::placeholder { color: var(--text-muted); }
  .search-box .si {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
    pointer-events: none;
  }

  /* 筛选下拉 */
  select.filter {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 9px 12px;
    outline: none;
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select.filter:focus { border-color: var(--border-active); color: var(--text); }
  select.filter option { background: #1a1c1e; }

  .count-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── 表格 ── */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    text-align: left;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }
  thead th:hover { color: var(--text-dim); }
  thead th.sorted { color: var(--accent); }
  thead th .sort-arrow { margin-left: 4px; opacity: 0.6; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 12px 14px; vertical-align: middle; }

  .td-id { font-family: var(--mono); font-size: 10px; color: var(--accent); white-space: nowrap; }
  .td-company { font-weight: 400; }
  .td-contact { color: var(--text-dim); font-size: 12px; }
  .td-channel { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
  .td-date { font-family: var(--mono); font-size: 10px; color: var(--text-muted); white-space: nowrap; }
  .td-date.recent { color: var(--green); }
  .td-date.stale  { color: var(--yellow); }
  .td-date.overdue { color: var(--red); }

  /* 客户等级 */
  .grade {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 1px;
    display: inline-block;
  }
  .grade-S { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .grade-A { background: rgba(58,123,213,0.15); color: #3a7bd5; }
  .grade-B { background: rgba(107,114,128,0.15); color: #9ca3af; }
  .grade-C { background: rgba(107,114,128,0.08); color: #6b7280; }

  /* 阶段标签 */
  .stage {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.06em;
    padding: 2px 7px;
    border-radius: 1px;
    white-space: nowrap;
  }
  .stage-待开发  { background: rgba(107,114,128,0.1); color: #6b7280; }
  .stage-已开发  { background: rgba(58,123,213,0.12); color: #3a7bd5; }
  .stage-已合作  { background: rgba(34,197,94,0.1);   color: #22c55e; }

  /* 操作按钮 */
  .btn-action {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border-radius: 1px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
    display: inline-block;
    white-space: nowrap;
  }
  .btn-log-sm {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  .btn-log-sm:hover { background: var(--accent); color: #fff; }

  /* 空状态 */
  .empty {
    text-align: center;
    padding: 48px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
  }

  /* 加载 */
  .loading {
    text-align: center;
    padding: 48px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 14px; height: 14px;
    border: 1px solid #242628;
    border-top-color: #3a7bd5;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 10px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 详情抽屉 ── */
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
  }
  .drawer-overlay.show { display: block; }
  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 360px;
    max-width: 100vw;
    background: #141618;
    border-left: 1px solid #242628;
    z-index: 301;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(.4,0,.2,1);
    padding: 24px 20px 40px;
  }
  .drawer.show { transform: translateX(0); }

  .drawer-close {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    margin-bottom: 20px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    padding: 0;
    transition: color 0.15s;
  }
  .drawer-close:hover { color: var(--text); }

  .drawer-id { font-family: var(--mono); font-size: 10px; color: var(--accent); margin-bottom: 6px; }
  .drawer-company { font-size: 18px; font-weight: 400; margin-bottom: 4px; }
  .drawer-contact { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }

  .drawer-section { margin-bottom: 20px; }
  .drawer-section-title {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .drawer-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
  .drawer-key { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
  .drawer-val { font-size: 13px; text-align: right; }

  .drawer-btn {
    display: block;
    width: 100%;
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px;
    cursor: pointer;
    border-radius: 2px;
    text-align: center;
    text-decoration: none;
    margin-top: 20px;
    transition: opacity 0.15s;
  }
  .drawer-btn:hover { opacity: 0.85; }

  /* 最近记录列表 */
  .log-mini { display: flex; flex-direction: column; gap: 8px; }
  .log-mini-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 12px;
  }
  .lmi-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .lmi-action { font-family: var(--mono); font-size: 9px; color: var(--accent); letter-spacing: 0.08em; }
  .lmi-date   { font-family: var(--mono); font-size: 9px; color: var(--text-muted); }
  .lmi-summary { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
</style>
</head>
<body>

<!-- 工具栏 -->
<div class="toolbar">
  <div class="search-box">
    <span class="si">⌕</span>
    <input type="text" id="searchInput" placeholder="搜索公司、联系人、ID..." autocomplete="off">
  </div>
  <select class="filter" id="filterStage">
    <option value="">全部阶段</option>
    <option value="待开发">待开发</option>
    <option value="已开发">已开发</option>
    <option value="已合作">已合作</option>
  </select>
  <select class="filter" id="filterGrade">
    <option value="">全部等级</option>
    <option value="S">S 级</option>
    <option value="A">A 级</option>
    <option value="B">B 级</option>
    <option value="C">C 级</option>
  </select>
  <span class="count-label" id="countLabel">— 客户</span>
</div>

<!-- 表格 -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('customer_id')">ID <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('company')">公司 <span class="sort-arrow">↕</span></th>
        <th>联系人</th>
        <th>渠道</th>
        <th>等级</th>
        <th>阶段</th>
        <th onclick="sortBy('last_contact_date')">最近联系 <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('next_followup_date')">下次跟进 <span class="sort-arrow">↕</span></th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="9"><div class="loading">加载中</div></td></tr>
    </tbody>
  </table>
</div>

<!-- 详情抽屉 -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">← 关闭</button>
  <div id="drawerContent"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzUR97X-G_YDEVoaMKnyrfl7iyvotDDqwjgAhSnrSOVieEhua_I31wgxlbaMp9FzNI0dQ/exec'; // ← 替换

let allCustomers = [];
let allLogs = [];
let sortKey = 'last_contact_date';
let sortAsc = false;

const CUSTOMER_FIELDS = {
  id: ['customer_id'],
  stage: ['customer_stage', '客户阶段'],
  grade: ['grade', '等级'],
  company: ['company', '公司'],
  country: ['country', '国家/地区'],
  contact: ['contact_person', '联系人'],
  channel: ['default_channel', 'channel', 'WhatsApp/Skype/LinkedIn'],
  source: ['source', '来源'],
  email: ['email', '邮箱'],
  lastContact: ['last_contact_date', '最后联系日期'],
  lastReply: ['last_reply_date', '最后回复日期'],
  lastRfq: ['last_rfq_date', '最后RFQ日期'],
  lastQuote: ['last_quote_date', '最后报价日期'],
  nextFollowup: ['next_followup_date', '下次跟进日期'],
  followupStatus: ['followup_status']
};

window.onload = () => {
  loadData();
  document.getElementById('searchInput').addEventListener('input', renderTable);
  document.getElementById('filterStage').addEventListener('change', renderTable);
  document.getElementById('filterGrade').addEventListener('change', renderTable);
};

async function loadData() {
  try {
    const [cRes, lRes] = await Promise.all([
      fetch(`${API_URL}?action=getCustomers`),
      fetch(`${API_URL}?action=getContactLog`)
    ]);
    const cJson = await cRes.json();
    const lJson = await lRes.json();
    if (cJson.status === 'ok') allCustomers = cJson.data;
    if (lJson.status === 'ok') allLogs = lJson.data;
    renderTable();
  } catch (err) {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="9"><div class="empty">加载失败: ${err.message}</div></td></tr>`;
  }
}

function renderTable() {
  const q       = document.getElementById('searchInput').value.toLowerCase();
  const stage   = document.getElementById('filterStage').value;
  const grade   = document.getElementById('filterGrade').value;
  const today   = formatDate(new Date());

  let list = allCustomers.filter(c => {
    if (stage && getCustomerValue(c, 'stage') !== stage) return false;
    if (grade && getCustomerValue(c, 'grade') !== grade) return false;
    const haystack = [
      getCustomerValue(c, 'company'),
      getCustomerValue(c, 'contact'),
      getCustomerValue(c, 'id')
    ].join(' ').toLowerCase();
    if (q && !haystack.includes(q)) return false;
    return true;
  });

  // 排序
  list.sort((a, b) => {
    const va = getCustomerValue(a, sortKey) || '';
    const vb = getCustomerValue(b, sortKey) || '';
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  document.getElementById('countLabel').textContent = `${list.length} 客户`;

  if (list.length === 0) {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="9"><div class="empty">没有匹配的客户</div></td></tr>`;
    return;
  }

  document.getElementById('tableBody').innerHTML = list.map(c => {
    const customerId = getCustomerValue(c, 'id');
    const company = getCustomerValue(c, 'company');
    const contact = getCustomerValue(c, 'contact');
    const channel = getCustomerValue(c, 'channel');
    const gradeValue = getCustomerValue(c, 'grade') || 'B';
    const stageValue = getCustomerValue(c, 'stage') || '待开发';
    const lastContact = getCustomerValue(c, 'lastContact');
    const nextFollowup = getCustomerValue(c, 'nextFollowup');
    const contactCls = dateClass(lastContact, today);
    const followupCls = nextFollowup < today && nextFollowup ? 'overdue' : (nextFollowup === today ? 'recent' : '');

    return `
      <tr onclick="openDrawer(decodeURIComponent('${encodeURIComponent(customerId)}'))">
        <td class="td-id">${escapeHtml(customerId) || '—'}</td>
        <td class="td-company">${escapeHtml(company) || '—'}</td>
        <td class="td-contact">${escapeHtml(contact) || '—'}</td>
        <td class="td-channel">${escapeHtml(channel) || '—'}</td>
        <td><span class="grade grade-${escapeAttr(gradeValue)}">${escapeHtml(getCustomerValue(c, 'grade')) || '—'}</span></td>
        <td><span class="stage stage-${escapeAttr(stageValue)}">${escapeHtml(getCustomerValue(c, 'stage')) || '—'}</span></td>
        <td class="td-date ${contactCls}">${escapeHtml(lastContact) || '—'}</td>
        <td class="td-date ${followupCls}">${escapeHtml(nextFollowup) || '—'}</td>
        <td onclick="event.stopPropagation()">
          <a class="btn-action btn-log-sm"
             href="contact-log.html?customer_id=${encodeURIComponent(customerId)}&company=${encodeURIComponent(company)}&contact=${encodeURIComponent(contact)}&channel=${encodeURIComponent(channel)}">
            + 记录
          </a>
        </td>
      </tr>
    `;
  }).join('');
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = false; }
  // 更新箭头
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  renderTable();
}

// ── 详情抽屉 ────────────────────────────────────────────
function openDrawer(customerId) {
  const c = allCustomers.find(x => getCustomerValue(x, 'id') === customerId);
  if (!c) return;

  const logs = allLogs
    .filter(l => l.customer_id === customerId)
    .slice(0, 5);
  const company = getCustomerValue(c, 'company');
  const contact = getCustomerValue(c, 'contact');
  const channel = getCustomerValue(c, 'channel');
  const gradeValue = getCustomerValue(c, 'grade') || 'B';
  const stageValue = getCustomerValue(c, 'stage') || '待开发';

  const logHtml = logs.length === 0
    ? '<div style="color:var(--text-muted);font-size:12px;font-family:var(--mono)">暂无记录</div>'
    : logs.map(l => `
        <div class="log-mini-item">
          <div class="lmi-top">
            <span class="lmi-action">${l.action_type || ''}</span>
            <span class="lmi-date">${l.log_date || ''}</span>
          </div>
          <div class="lmi-summary">${l.ai_summary || l.my_message || '—'}</div>
        </div>
      `).join('');

  document.getElementById('drawerContent').innerHTML = `
    <div class="drawer-id">${escapeHtml(customerId)}</div>
    <div class="drawer-company">${escapeHtml(company) || '—'}</div>
    <div class="drawer-contact">${escapeHtml(contact)} · ${escapeHtml(channel)}</div>

    <div class="drawer-section">
      <div class="drawer-section-title">客户信息</div>
      <div class="drawer-row"><span class="drawer-key">等级</span><span class="drawer-val"><span class="grade grade-${escapeAttr(gradeValue)}">${escapeHtml(getCustomerValue(c, 'grade'))||'—'}</span></span></div>
      <div class="drawer-row"><span class="drawer-key">阶段</span><span class="drawer-val"><span class="stage stage-${escapeAttr(stageValue)}">${escapeHtml(getCustomerValue(c, 'stage'))||'—'}</span></span></div>
      <div class="drawer-row"><span class="drawer-key">国家</span><span class="drawer-val">${escapeHtml(getCustomerValue(c, 'country'))||'—'}</span></div>
      <div class="drawer-row"><span class="drawer-key">来源</span><span class="drawer-val">${escapeHtml(getCustomerValue(c, 'source'))||'—'}</span></div>
      <div class="drawer-row"><span class="drawer-key">Email</span><span class="drawer-val" style="font-size:11px">${escapeHtml(getCustomerValue(c, 'email'))||'—'}</span></div>
      <div class="drawer-row"><span class="drawer-key">WhatsApp</span><span class="drawer-val">${escapeHtml(channel)||'—'}</span></div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">跟进状态</div>
      <div class="drawer-row"><span class="drawer-key">最近联系</span><span class="drawer-val">${escapeHtml(getCustomerValue(c, 'lastContact'))||'—'}</span></div>
      <div class="drawer-row"><span class="drawer-key">最近回复</span><span class="drawer-val">${escapeHtml(getCustomerValue(c, 'lastReply'))||'—'}</span></div>
      <div class="drawer-row"><span class="drawer-key">最近 RFQ</span><span class="drawer-val">${escapeHtml(getCustomerValue(c, 'lastRfq'))||'—'}</span></div>
      <div class="drawer-row"><span class="drawer-key">最近报价</span><span class="drawer-val">${escapeHtml(getCustomerValue(c, 'lastQuote'))||'—'}</span></div>
      <div class="drawer-row"><span class="drawer-key">下次跟进</span><span class="drawer-val">${escapeHtml(getCustomerValue(c, 'nextFollowup'))||'—'}</span></div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">最近 5 条记录</div>
      <div class="log-mini">${logHtml}</div>
    </div>

    <a class="drawer-btn"
       href="contact-log.html?customer_id=${encodeURIComponent(customerId)}&company=${encodeURIComponent(company)}&contact=${encodeURIComponent(contact)}&channel=${encodeURIComponent(channel)}">
      + 记录本次沟通
    </a>
  `;

  document.getElementById('drawerOverlay').classList.add('show');
  document.getElementById('drawer').classList.add('show');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('show');
  document.getElementById('drawer').classList.remove('show');
}

// ── 工具函数 ────────────────────────────────────────────
function getCustomerValue(customer, field) {
  const keys = CUSTOMER_FIELDS[field] || [field];
  for (const key of keys) {
    const value = customer[key];
    if (value !== undefined && value !== null && value !== '') return String(value);
  }
  return '';
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[ch]));
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, '&#96;');
}

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dateClass(date, today) {
  if (!date) return '';
  const diff = (new Date(today) - new Date(date)) / 86400000;
  if (diff <= 3)  return 'recent';
  if (diff <= 14) return '';
  return 'stale';
}
</script>
</body>
</html>
