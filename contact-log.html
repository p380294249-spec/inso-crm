<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSO CRM — 记录沟通</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="nav.js"></script>
<style>
  :root {
    --bg: #0d0f11;
    --surface: #141618;
    --border: #242628;
    --border-active: #3a7bd5;
    --text: #e8eaed;
    --text-dim: #6b7280;
    --text-muted: #374151;
    --accent: #3a7bd5;
    --accent-dim: rgba(58,123,213,0.12);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.1);
    --yellow: #f59e0b;
    --red: #ef4444;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans SC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  /* ── 顶部导航 ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .logo {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 4px 10px;
  }
  .page-title {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  /* ── 卡片容器 ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .card-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* ── 搜索区 ── */
  .search-wrap {
    position: relative;
  }
  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 400;
    padding: 12px 16px 12px 42px;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--border-active); }
  .search-input::placeholder { color: var(--text-muted); }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 15px;
    pointer-events: none;
  }
  .customer-select-row {
    margin-top: 10px;
  }
  .customer-select {
    font-family: var(--sans);
  }

  /* ── 搜索结果下拉 ── */
  .search-results {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: #1a1c1e;
    border: 1px solid var(--border-active);
    border-radius: 2px;
    z-index: 100;
    max-height: 240px;
    overflow-y: auto;
  }
  .search-results.show { display: block; }
  .result-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: var(--accent-dim); }
  .result-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    min-width: 80px;
  }
  .result-company { font-size: 14px; font-weight: 400; }
  .result-contact { font-size: 12px; color: var(--text-dim); }
  .result-grade {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 1px;
  }
  .grade-S { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .grade-A { background: rgba(58,123,213,0.15); color: #3a7bd5; }
  .grade-B { background: rgba(107,114,128,0.15); color: #9ca3af; }
  .no-results { padding: 16px; text-align: center; color: var(--text-dim); font-size: 13px; }

  /* ── 已选客户信息 ── */
  .selected-customer {
    display: none;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 2px;
    padding: 14px 16px;
    margin-top: 12px;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .selected-customer.show { display: flex; }
  .sel-field { display: flex; flex-direction: column; gap: 2px; }
  .sel-key {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .sel-val { font-size: 13px; font-weight: 400; }
  .sel-clear {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 1px;
    font-family: var(--mono);
    transition: all 0.15s;
  }
  .sel-clear:hover { border-color: var(--red); color: var(--red); }

  /* ── 表单字段 ── */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .form-row.single { grid-template-columns: 1fr; }
  .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .field-label .required { color: var(--accent); margin-left: 2px; }

  input, select, textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 400;
    padding: 10px 12px;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.15s;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--border-active); }
  input::placeholder, textarea::placeholder { color: var(--text-muted); }
  select { cursor: pointer; }
  select option { background: #1a1c1e; }
  textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

  /* ── 勾选区 ── */
  .toggle-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .toggle-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 7px 14px;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.15s;
    user-select: none;
  }
  .toggle-btn:hover { border-color: var(--accent); color: var(--text); }
  .toggle-btn.active {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-dim);
  }
  .toggle-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.5;
    transition: opacity 0.15s;
  }
  .toggle-btn.active .toggle-dot { opacity: 1; }

  /* ── 提交按钮 ── */
  .btn-submit {
    width: 100%;
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    border-radius: 2px;
    margin-top: 8px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:active { transform: scale(0.99); }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── 状态提示 ── */
  .toast {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1c1e;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: var(--mono);
    font-size: 12px;
    padding: 12px 20px;
    border-radius: 2px;
    z-index: 999;
    letter-spacing: 0.08em;
  }
  .toast.error { border-color: var(--red); color: var(--red); }
  .toast.show { display: block; animation: fadeup 0.2s ease; }
  @keyframes fadeup {
    from { opacity: 0; transform: translateX(-50%) translateY(8px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── 分隔线 ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* ── 响应式 ── */
  @media (max-width: 520px) {
    .form-row { grid-template-columns: 1fr; }
    .form-row.triple { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<!-- Step 1: 搜索客户 -->
<div class="card">
  <div class="card-label">01 — 选择客户</div>
  <div class="search-wrap" id="searchWrap">
    <span class="search-icon">⌕</span>
    <input
      type="text"
      class="search-input"
      id="searchInput"
      placeholder="搜索公司名称或联系人..."
      autocomplete="off"
    >
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="customer-select-row">
    <select class="customer-select" id="customerSelect">
      <option value="">先搜索或从这里选择联系人 / 公司</option>
    </select>
  </div>

  <!-- 已选客户展示 -->
  <div class="selected-customer" id="selectedDisplay">
    <div class="sel-field">
      <span class="sel-key">客户ID</span>
      <span class="sel-val" id="dispId">—</span>
    </div>
    <div class="sel-field">
      <span class="sel-key">公司</span>
      <span class="sel-val" id="dispCompany">—</span>
    </div>
    <div class="sel-field">
      <span class="sel-key">联系人</span>
      <span class="sel-val" id="dispContact">—</span>
    </div>
    <div class="sel-field">
      <span class="sel-key">渠道</span>
      <span class="sel-val" id="dispChannel">—</span>
    </div>
    <button class="sel-clear" onclick="clearCustomer()">✕ 重选</button>
  </div>
</div>

<!-- Step 2: 沟通内容 -->
<div class="card">
  <div class="card-label">02 — 本次沟通</div>

  <div class="form-row triple">
    <div class="field">
      <label class="field-label">动作类型 <span class="required">*</span></label>
      <select id="actionType">
        <option value="SENT">发送消息</option>
        <option value="RECEIVED">收到回复</option>
        <option value="RFQ_RECEIVED">收到 RFQ</option>
        <option value="QUOTED">已报价</option>
        <option value="FOLLOW_UP">跟进</option>
        <option value="ORDER_WON">成单</option>
        <option value="NO_REPLY">无回复</option>
      </select>
    </div>
    <div class="field">
      <label class="field-label">联系渠道</label>
      <select id="channel">
        <option value="WhatsApp">WhatsApp</option>
        <option value="Email">Email</option>
        <option value="WeChat">WeChat</option>
        <option value="Skype">Skype</option>
        <option value="LinkedIn">LinkedIn</option>
        <option value="Phone">Phone</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="field">
      <label class="field-label">日期</label>
      <input type="date" id="logDate">
    </div>
  </div>

  <div class="form-row single">
    <div class="field">
      <label class="field-label">我发了什么</label>
      <textarea id="myMessage" placeholder="粘贴你发送的内容..."></textarea>
    </div>
  </div>

  <div class="form-row single">
    <div class="field">
      <label class="field-label">客户回复</label>
      <textarea id="customerReply" placeholder="粘贴客户回复内容..."></textarea>
    </div>
  </div>

  <div class="form-row single">
    <div class="field">
      <label class="field-label">AI 整理摘要</label>
      <textarea id="aiSummary" placeholder="粘贴 GPT 整理后的重点内容..." style="min-height:70px;"></textarea>
    </div>
  </div>

  <hr class="divider">

  <!-- 本次结果勾选 -->
  <div class="field-label" style="margin-bottom:10px;">本次结果</div>
  <div class="toggle-row">
    <button class="toggle-btn" id="togReply" onclick="toggle('togReply','has_reply')">
      <span class="toggle-dot"></span>客户已回复
    </button>
    <button class="toggle-btn" id="togDemand" onclick="toggle('togDemand','has_demand')">
      <span class="toggle-dot"></span>有需求
    </button>
    <button class="toggle-btn" id="togRfq" onclick="toggle('togRfq','has_rfq')">
      <span class="toggle-dot"></span>收到 RFQ
    </button>
    <button class="toggle-btn" id="togQuote" onclick="toggle('togQuote','has_quote')">
      <span class="toggle-dot"></span>已报价
    </button>
  </div>

  <hr class="divider">

  <div class="form-row">
    <div class="field">
      <label class="field-label">Result 状态</label>
      <select id="result">
        <option value="已触达">已触达</option>
        <option value="已回复">已回复</option>
        <option value="有需求">有需求</option>
        <option value="已发RFQ">已发RFQ</option>
        <option value="已报价">已报价</option>
        <option value="已成交">已成交</option>
        <option value="无回复">无回复</option>
        <option value="无效客户">无效客户</option>
      </select>
    </div>
    <div class="field">
      <label class="field-label">下次跟进日期</label>
      <input type="date" id="nextFollowup">
    </div>
  </div>

  <div class="form-row single">
    <div class="field">
      <label class="field-label">备注</label>
      <input type="text" id="remark" placeholder="可选">
    </div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="submitLog()">保存沟通记录</button>
</div>

<!-- Toast 提示 -->
<div class="toast" id="toast"></div>

<script>
  // ── 配置 ──────────────────────────────────────────
  const API_URL = 'https://script.google.com/macros/s/AKfycbzUR97X-G_YDEVoaMKnyrfl7iyvotDDqwjgAhSnrSOVieEhua_I31wgxlbaMp9FzNI0dQ/exec'; // ← 替换成 Apps Script 部署网址

  // ── 状态 ──────────────────────────────────────────
  let selectedCustomer = null;
  let toggleState = { has_reply: false, has_demand: false, has_rfq: false, has_quote: false };
  let searchTimer = null;
  let allCustomers = [];

  // ── 初始化 ──────────────────────────────────────────
  window.onload = () => {
    // 设置今天日期
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('logDate').value = today;

    // 预加载客户列表（缓存到本地，减少 API 调用）
    loadCustomers().then(() => {
      // 从 Dashboard 跳转过来时，URL 带有客户参数，自动选中
      const params = new URLSearchParams(window.location.search);
      const cid = params.get('customer_id');
      if (cid) {
        const found = allCustomers.find(c => c.customer_id === cid);
        if (found) {
          selectCustomer(found);
        } else {
          // 如果缓存里没有（数据还没加载），手动构造
          selectCustomer({
            customer_id:     cid,
            company:         params.get('company') || '',
            contact_person:  params.get('contact') || '',
            default_channel: params.get('channel') || ''
          });
        }
      }
    });

    // 点击外部关闭下拉
    document.addEventListener('click', (e) => {
      if (!document.getElementById('searchWrap').contains(e.target)) {
        document.getElementById('searchResults').classList.remove('show');
      }
    });
  };

  async function loadCustomers() {
    try {
      const res = await fetch(`${API_URL}?action=getCustomers`);
      const data = await res.json();
      if (data.status === 'ok') {
        allCustomers = data.data;
        renderCustomerOptions(allCustomers);
      }
    } catch (e) {
      // 静默失败，搜索时再试
    }
    return true;
  }

  // ── 搜索逻辑 ──────────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    if (q.length < 1) {
      document.getElementById('searchResults').classList.remove('show');
      renderCustomerOptions(allCustomers);
      return;
    }
    searchTimer = setTimeout(() => doSearch(q), 250);
  });

  document.getElementById('customerSelect').addEventListener('change', (e) => {
    const selectedId = e.target.value;
    if (!selectedId) return;
    const found = allCustomers.find(c => getCustomerField(c, 'id') === selectedId);
    if (found) selectCustomer(found);
  });

  document.getElementById('searchInput').addEventListener('focus', (e) => {
    if (e.target.value.trim().length > 0) doSearch(e.target.value.trim());
  });

  function doSearch(q) {
    const keyword = q.toLowerCase();
    let results = allCustomers.filter(c =>
      getSearchText(c).toLowerCase().includes(keyword)
    ).slice(0, 8);

    renderCustomerOptions(results, q);
    renderResults(results, q);
  }

  function renderResults(results, q) {
    const el = document.getElementById('searchResults');
    if (results.length === 0) {
      el.innerHTML = `<div class="no-results">无匹配客户 "${q}"</div>`;
    } else {
      el.innerHTML = results.map(c => `
        <div class="result-item" onclick="selectCustomerById('${encodeURIComponent(getCustomerField(c, 'id'))}')">
          <span class="result-id">${getCustomerField(c, 'id') || ''}</span>
          <div>
            <div class="result-company">${highlight(getCustomerField(c, 'company'), q)}</div>
            <div class="result-contact">${highlight(getCustomerField(c, 'contact'), q)} · ${highlight(getCustomerField(c, 'channel'), q)}</div>
          </div>
          <span class="result-grade grade-${getCustomerField(c, 'grade') || 'B'}">${getCustomerField(c, 'grade') || '—'}</span>
        </div>
      `).join('');
    }
    el.classList.add('show');
  }

  function renderCustomerOptions(customers, q = '') {
    const select = document.getElementById('customerSelect');
    const options = customers.slice(0, 50).map(c => {
      const id = getCustomerField(c, 'id');
      const contact = getCustomerField(c, 'contact') || '无联系人';
      const company = getCustomerField(c, 'company') || '无公司名';
      const channel = getCustomerField(c, 'channel');
      const label = `${contact} — ${company}${channel ? ' — ' + channel : ''} — ${id}`;
      return `<option value="${escapeAttr(id)}">${escapeHtml(label)}</option>`;
    }).join('');
    const placeholder = q ? `选择匹配 "${q}" 的联系人 / 公司` : '选择联系人 / 公司';
    select.innerHTML = `<option value="">${escapeHtml(placeholder)}</option>${options}`;
  }

  function highlight(text, q) {
    if (!q || !text) return text || '';
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return escapeHtml(text).replace(re, '<mark style="background:rgba(58,123,213,0.3);color:#fff;border-radius:1px;">$1</mark>');
  }

  function getCustomerField(c, field) {
    const map = {
      id: ['customer_id'],
      company: ['company', '公司'],
      contact: ['contact_person', '联系人'],
      channel: ['default_channel', 'channel', 'WhatsApp/Skype/LinkedIn'],
      grade: ['grade', '等级']
    };
    for (const key of map[field] || [field]) {
      if (c[key] !== undefined && c[key] !== null && c[key] !== '') return String(c[key]);
    }
    return '';
  }

  function getSearchText(c) {
    return [
      getCustomerField(c, 'id'),
      getCustomerField(c, 'company'),
      getCustomerField(c, 'contact'),
      getCustomerField(c, 'channel'),
      getCustomerField(c, 'grade')
    ].join(' ');
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[ch]));
  }

  function escapeAttr(value) {
    return escapeHtml(value).replace(/`/g, '&#96;');
  }

  // ── 选择客户 ──────────────────────────────────────────
  function selectCustomerById(encodedId) {
    const id = decodeURIComponent(encodedId);
    const found = allCustomers.find(c => getCustomerField(c, 'id') === id);
    if (found) selectCustomer(found);
  }

  function selectCustomer(c) {
    selectedCustomer = c;
    const id = getCustomerField(c, 'id');
    const company = getCustomerField(c, 'company');
    const contact = getCustomerField(c, 'contact');
    const channel = getCustomerField(c, 'channel');
    document.getElementById('searchInput').value = `${contact || '无联系人'} · ${company || '无公司名'}`;
    document.getElementById('customerSelect').value = id;
    document.getElementById('searchResults').classList.remove('show');

    document.getElementById('dispId').textContent = id || '—';
    document.getElementById('dispCompany').textContent = company || '—';
    document.getElementById('dispContact').textContent = contact || '—';
    document.getElementById('dispChannel').textContent = channel || '—';
    document.getElementById('selectedDisplay').classList.add('show');

    // 自动设置默认渠道
    if (channel) {
      const sel = document.getElementById('channel');
      for (let opt of sel.options) {
        if (opt.value === channel) { sel.value = channel; break; }
      }
    }
  }

  function clearCustomer() {
    selectedCustomer = null;
    document.getElementById('searchInput').value = '';
    document.getElementById('customerSelect').value = '';
    document.getElementById('selectedDisplay').classList.remove('show');
  }

  // ── Toggle 按钮 ──────────────────────────────────────────
  function toggle(btnId, field) {
    toggleState[field] = !toggleState[field];
    document.getElementById(btnId).classList.toggle('active', toggleState[field]);
  }

  // ── 提交 ──────────────────────────────────────────
  async function submitLog() {
    if (!selectedCustomer) {
      showToast('请先选择客户', true); return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '保存中...';

    const payload = {
      action: 'addContactLog',
      data: {
        customer_id:       getCustomerField(selectedCustomer, 'id'),
        company:           getCustomerField(selectedCustomer, 'company'),
        contact_person:    getCustomerField(selectedCustomer, 'contact'),
        channel:           document.getElementById('channel').value,
        action_type:       document.getElementById('actionType').value,
        log_date:          document.getElementById('logDate').value,
        my_message:        document.getElementById('myMessage').value,
        customer_reply:    document.getElementById('customerReply').value,
        ai_summary:        document.getElementById('aiSummary').value,
        result:            document.getElementById('result').value,
        has_reply:         toggleState.has_reply ? 'TRUE' : 'FALSE',
        has_demand:        toggleState.has_demand ? 'TRUE' : 'FALSE',
        has_rfq:           toggleState.has_rfq ? 'TRUE' : 'FALSE',
        has_quote:         toggleState.has_quote ? 'TRUE' : 'FALSE',
        next_followup_date: document.getElementById('nextFollowup').value,
        remark:            document.getElementById('remark').value,
        created_by:        'Shawn'
      }
    };

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (data.status === 'ok') {
        showToast(`✓ 已保存 ${data.log_id}`);
        resetForm();
      } else {
        showToast('保存失败: ' + data.message, true);
      }
    } catch (err) {
      showToast('网络错误: ' + err.message, true);
    }

    btn.disabled = false;
    btn.textContent = '保存沟通记录';
  }

  // ── 重置表单 ──────────────────────────────────────────
  function resetForm() {
    clearCustomer();
    document.getElementById('myMessage').value = '';
    document.getElementById('customerReply').value = '';
    document.getElementById('aiSummary').value = '';
    document.getElementById('remark').value = '';
    document.getElementById('nextFollowup').value = '';
    document.getElementById('actionType').value = 'SENT';
    document.getElementById('result').value = '已触达';

    // 重置 toggles
    Object.keys(toggleState).forEach(k => toggleState[k] = false);
    ['togReply','togDemand','togRfq','togQuote'].forEach(id =>
      document.getElementById(id).classList.remove('active')
    );
  }

  // ── Toast 提示 ──────────────────────────────────────────
  function showToast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => el.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
