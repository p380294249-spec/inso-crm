<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSO CRM — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="nav.js"></script>
<style>
  :root {
    --bg: #f6f7fb;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --border: #dde3ea;
    --text: #18202f;
    --text-dim: #64748b;
    --text-muted: #9aa5b1;
    --accent: #2563eb;
    --accent-dim: rgba(37,99,235,0.08);
    --green: #16a34a;
    --green-dim: rgba(22,163,74,0.08);
    --yellow: #d97706;
    --yellow-dim: rgba(217,119,6,0.08);
    --red: #dc2626;
    --red-dim: rgba(220,38,38,0.08);
    --purple: #7c3aed;
    --purple-dim: rgba(124,58,237,0.08);
    --shadow: 0 12px 32px rgba(15,23,42,0.06);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans SC', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    padding: 24px 16px 60px;
    max-width: 980px;
    margin: 0 auto;
  }

  /* ── 顶部 ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
  }
  .page-title { font-family: var(--mono); font-size: 12px; color: var(--text-dim); letter-spacing: 0.08em; }
  .date-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .top-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .btn-page {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.15s;
    text-decoration: none;
    white-space: nowrap;
  }
  .btn-page:hover { background: var(--accent); color: #fff; box-shadow: 0 8px 20px rgba(37,99,235,0.18); }

  /* ── Tab 切换 ── */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    padding: 10px 18px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── 视图容器 ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── 漏斗卡片网格 ── */
  .funnel-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  @media (max-width: 560px) { .funnel-grid { grid-template-columns: repeat(2, 1fr); } }

  .funnel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 16px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .funnel-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .fc-contacted::before { background: var(--accent); }
  .fc-replied::before   { background: var(--green); }
  .fc-demand::before    { background: var(--yellow); }
  .fc-rfq::before       { background: var(--purple); }
  .fc-quoted::before    { background: var(--green); }
  .fc-pending::before   { background: var(--red); }

  .fc-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .fc-num {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 4px;
  }
  .fc-contacted .fc-num { color: var(--accent); }
  .fc-replied .fc-num   { color: var(--green); }
  .fc-demand .fc-num    { color: var(--yellow); }
  .fc-rfq .fc-num       { color: var(--purple); }
  .fc-quoted .fc-num    { color: var(--green); }
  .fc-pending .fc-num   { color: var(--red); }

  .fc-sub { font-size: 11px; color: var(--text-muted); }

  /* ── 待跟进列表 ── */
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .badge {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid var(--red);
    font-family: var(--mono);
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 6px;
  }
  .badge.ok { background: var(--green-dim); color: var(--green); border-color: var(--green); }

  .followup-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .followup-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    transition: border-color 0.15s;
  }
  .followup-item:hover { border-color: var(--accent); box-shadow: var(--shadow); }
  .followup-item.overdue { border-left: 2px solid var(--red); }
  .followup-item.today   { border-left: 2px solid var(--yellow); }

  .fi-id { font-family: var(--mono); font-size: 10px; color: var(--accent); min-width: 75px; }
  .fi-company { font-size: 14px; font-weight: 400; flex: 1; }
  .fi-contact { font-size: 12px; color: var(--text-dim); }
  .fi-date {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-left: auto;
  }
  .fi-date.overdue { color: var(--red); }
  .fi-date.today   { color: var(--yellow); }

  .btn-log {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-log:hover { background: var(--accent); color: #fff; box-shadow: 0 8px 20px rgba(37,99,235,0.18); }

  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    border: 1px dashed var(--border);
    border-radius: 8px;
  }

  /* ── 趋势图区域 ── */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .chart-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* ── 简易条形图 ── */
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); width: 70px; text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 22px; background: var(--surface2); border-radius: 6px; overflow: hidden; position: relative; }
  .bar-fill {
    height: 100%;
    border-radius: 6px;
    display: flex;
    align-items: center;
    padding-left: 8px;
    font-family: var(--mono);
    font-size: 10px;
    color: rgba(255,255,255,0.88);
    min-width: 28px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }
  .bar-fill.contacted { background: rgba(58,123,213,0.5); }
  .bar-fill.replied   { background: rgba(34,197,94,0.5); }
  .bar-fill.rfq       { background: rgba(167,139,250,0.5); }
  .bar-fill.quoted    { background: rgba(34,197,94,0.7); }

  /* ── 图例 ── */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; color: var(--text-dim); cursor: pointer; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── 加载状态 ── */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 1px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 10px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 刷新按钮 ── */
  .btn-refresh {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.15s;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  /* ── 统计表格（月视图）── */
  .stat-table { width: 100%; border-collapse: collapse; }
  .stat-table th {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .stat-table td {
    font-size: 13px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
  }
  .stat-table tr:last-child td { border-bottom: none; }
  .stat-table tr:hover td { background: var(--surface2); }
  .td-num { color: var(--accent); text-align: right; }
  .td-date { color: var(--text-dim); font-size: 11px; }
</style>
</head>
<body>
<!-- ── 顶部 ── -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">INSO</div>
    <div class="page-title">CRM DASHBOARD</div>
  </div>
  <div class="top-actions">
    <span class="date-label" id="todayLabel">—</span>
    <a class="btn-page" href="customers.html">客户列表</a>
    <a class="btn-page" href="contact-log.html">记录沟通</a>
    <button class="btn-refresh" onclick="refreshCurrent()">刷新</button>
  </div>
</div>

<!-- ── Tab 切换 ── -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('today')">今日</div>
  <div class="tab" onclick="switchTab('week')">本周</div>
  <div class="tab" onclick="switchTab('month')">本月</div>
</div>

<!-- ── 今日视图 ── -->
<div class="view active" id="view-today">
  <div id="todayFunnel"><div class="loading">加载中</div></div>
  <div id="todayFollowups"><div class="loading">加载中</div></div>
</div>

<!-- ── 本周视图 ── -->
<div class="view" id="view-week">
  <div id="weekChart"><div class="empty-state">切换到本周后加载</div></div>
</div>

<!-- ── 本月视图 ── -->
<div class="view" id="view-month">
  <div id="monthChart"><div class="empty-state">切换到本月后加载</div></div>
</div>

<script>
// ── 配置 ────────────────────────────────────────────
const API_URL       = 'https://script.google.com/macros/s/AKfycbzUR97X-G_YDEVoaMKnyrfl7iyvotDDqwjgAhSnrSOVieEhua_I31wgxlbaMp9FzNI0dQ/exec'; // ← 替换
const CONTACT_PAGE  = 'contact-log.html';           // ← 联系录入页面路径

// ── 状态 ────────────────────────────────────────────
let currentTab = 'today';
let cache = {};
let loadedTabs = { today: false, week: false, month: false };

// ── 初始化 ────────────────────────────────────────────
function initDashboard() {
  const today = new Date();
  document.getElementById('todayLabel').textContent = formatDate(today);
  loadTodayView();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initDashboard);
} else {
  initDashboard();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['today','week','month'][i] === tab);
  });
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');

  if (tab === 'today' && !loadedTabs.today) loadTodayView();
  if (tab === 'week' && !loadedTabs.week) loadWeek();
  if (tab === 'month' && !loadedTabs.month) loadMonth();
}

async function loadTodayView() {
  loadedTabs.today = true;
  await syncQuoteSheet();
  loadToday();
  loadFollowups();
}

function refreshCurrent() {
  cache = {};
  loadedTabs[currentTab] = false;
  if (currentTab === 'today') loadTodayView();
  if (currentTab === 'week') loadWeek();
  if (currentTab === 'month') loadMonth();
}

async function fetchApi(action) {
  if (!cache[action]) {
    cache[action] = fetch(`${API_URL}?action=${action}`).then(res => res.json());
  }
  return cache[action];
}

async function syncQuoteSheet() {
  try {
    const res = await fetch(`${API_URL}?action=syncQuotes&t=${Date.now()}`);
    const json = await res.json();
    if (json.status === 'ok') {
      delete cache.getDashboard;
      delete cache.getFollowups;
      delete cache.getContactLog;
      delete cache.getCustomers;
    }
  } catch (err) {
    console.warn('quote sync skipped', err);
  }
}

// ── 今日漏斗 ────────────────────────────────────────────
async function loadToday() {
  const el = document.getElementById('todayFunnel');
  el.innerHTML = '<div class="loading">加载中</div>';
  try {
    const json = await fetchApi('getDashboard');
    if (json.status !== 'ok') throw new Error(json.message);
    const d = json.data;

    const pct = (a, b) => b === 0 ? '—' : Math.round(a / b * 100) + '%';

    el.innerHTML = `
      <div class="funnel-grid">
        <div class="funnel-card fc-contacted">
          <div class="fc-label">今日触达</div>
          <div class="fc-num">${d.contacted_count}</div>
          <div class="fc-sub">客户</div>
        </div>
        <div class="funnel-card fc-replied">
          <div class="fc-label">已回复</div>
          <div class="fc-num">${d.replied_count}</div>
          <div class="fc-sub">回复率 ${pct(d.replied_count, d.contacted_count)}</div>
        </div>
        <div class="funnel-card fc-demand">
          <div class="fc-label">有需求</div>
          <div class="fc-num">${d.demand_count}</div>
          <div class="fc-sub">占回复 ${pct(d.demand_count, d.replied_count)}</div>
        </div>
        <div class="funnel-card fc-rfq">
          <div class="fc-label">收到 RFQ</div>
          <div class="fc-num">${d.rfq_count}</div>
          <div class="fc-sub">客户</div>
        </div>
        <div class="funnel-card fc-quoted">
          <div class="fc-label">已报价</div>
          <div class="fc-num">${d.quoted_count}</div>
          <div class="fc-sub">客户</div>
        </div>
        <div class="funnel-card fc-pending">
          <div class="fc-label">待报价 RFQ</div>
          <div class="fc-num">${d.pending_quote_count}</div>
          <div class="fc-sub">${d.pending_quote_count > 0 ? '⚠ 需要处理' : '全部完成'}</div>
        </div>
      </div>
    `;
  } catch (err) {
    el.innerHTML = `<div class="empty-state">加载失败: ${err.message}</div>`;
  }
}

// ── 今日待跟进 ────────────────────────────────────────────
async function loadFollowups() {
  const el = document.getElementById('todayFollowups');
  el.innerHTML = '<div class="loading">加载中</div>';
  try {
    const json = await fetchApi('getFollowups');
    if (json.status !== 'ok') throw new Error(json.message);

    const items = json.data;
    const today = formatDate(new Date());

    if (items.length === 0) {
      el.innerHTML = `
        <div class="section-label">今日待跟进 <span class="badge ok">0</span></div>
        <div class="empty-state">
          今天没有待跟进客户 ✓
          <div style="margin-top:14px;">
            <a class="btn-log" href="contact-log.html">+ 记录沟通</a>
            <a class="btn-log" href="customers.html" style="margin-left:8px;">客户列表</a>
          </div>
        </div>
      `;
      return;
    }

    const rows = items.map(c => {
      const followupDate = getField(c, 'next_followup_date', '下次跟进日期');
      const company = getField(c, 'company', '公司');
      const contact = getField(c, 'contact_person', '联系人');
      const channel = getField(c, 'default_channel', 'WhatsApp/Skype/LinkedIn');
      const isOverdue = followupDate < today;
      const isToday   = followupDate === today;
      const cls = isOverdue ? 'overdue' : (isToday ? 'today' : '');
      const dateCls = isOverdue ? 'overdue' : (isToday ? 'today' : '');
      const label = isOverdue ? '已逾期' : (isToday ? '今天' : followupDate);

      return `
        <div class="followup-item ${cls}">
          <span class="fi-id">${c.customer_id || '—'}</span>
          <div>
            <div class="fi-company">${company || '—'}</div>
            <div class="fi-contact">${contact || ''} · ${channel || ''}</div>
          </div>
          <span class="fi-date ${dateCls}">${label}</span>
          <a class="btn-log" href="${CONTACT_PAGE}?customer_id=${encodeURIComponent(c.customer_id)}&company=${encodeURIComponent(company)}&contact=${encodeURIComponent(contact)}&channel=${encodeURIComponent(channel)}">
            + 记录沟通
          </a>
        </div>
      `;
    }).join('');

    el.innerHTML = `
      <div class="section-label">今日待跟进 <span class="badge">${items.length}</span></div>
      <div class="followup-list">${rows}</div>
    `;
  } catch (err) {
    el.innerHTML = `<div class="empty-state">加载失败: ${err.message}</div>`;
  }
}

// ── 本周趋势 ────────────────────────────────────────────
async function loadWeek() {
  loadedTabs.week = true;
  const el = document.getElementById('weekChart');
  el.innerHTML = '<div class="loading">加载中</div>';
  try {
    const json = await fetchApi('getContactLog');
    if (json.status !== 'ok') throw new Error(json.message);

    const logs = json.data;
    const days = getLast7Days();
    const stats = days.map(date => computeDayStats(logs, date));

    const maxVal = Math.max(...stats.map(s => s.contacted), 1);

    const bars = stats.map((s, i) => {
      const label = days[i].slice(5); // MM-DD
      const wPct = (v) => Math.max(v / maxVal * 100, v > 0 ? 4 : 0) + '%';
      return `
        <div class="bar-row">
          <div class="bar-label">${label}</div>
          <div class="bar-track">
            <div class="bar-fill contacted" style="width:${wPct(s.contacted)}">${s.contacted || ''}</div>
          </div>
          <div class="bar-track">
            <div class="bar-fill replied" style="width:${wPct(s.replied)}">${s.replied || ''}</div>
          </div>
          <div class="bar-track">
            <div class="bar-fill rfq" style="width:${wPct(s.rfq)}">${s.rfq || ''}</div>
          </div>
        </div>
      `;
    }).join('');

    el.innerHTML = `
      <div class="chart-card">
        <div class="chart-title">近 7 天漏斗趋势</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:rgba(58,123,213,0.7)"></div>触达</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(34,197,94,0.7)"></div>回复</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(167,139,250,0.7)"></div>RFQ</div>
        </div>
        <div class="bar-chart">${bars}</div>
      </div>
    `;
  } catch (err) {
    el.innerHTML = `<div class="empty-state">加载失败: ${err.message}</div>`;
  }
}

// ── 本月统计 ────────────────────────────────────────────
async function loadMonth() {
  loadedTabs.month = true;
  const el = document.getElementById('monthChart');
  el.innerHTML = '<div class="loading">加载中</div>';
  try {
    const [logJson, custJson] = await Promise.all([
      fetchApi('getContactLog'),
      fetchApi('getCustomers')
    ]);

    if (logJson.status !== 'ok') throw new Error(logJson.message);

    const logs  = logJson.data;
    const custs = custJson.status === 'ok' ? custJson.data : [];

    const now = new Date();
    const monthPrefix = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const monthLogs   = logs.filter(l => normalizeDate(l.log_date).startsWith(monthPrefix));

    const uniqueBy = (arr, key) => [...new Set(arr.map(r => r[key]).filter(Boolean))].length;

    const monthStats = {
      contacted: uniqueBy(monthLogs.filter(l => l.action_type === 'SENT'), 'customer_id'),
      replied:   uniqueBy(monthLogs.filter(l => l.has_reply === 'TRUE'), 'customer_id'),
      rfq:       uniqueBy(monthLogs.filter(l => l.has_rfq === 'TRUE'), 'customer_id'),
      quoted:    uniqueBy(monthLogs.filter(l => l.has_quote === 'TRUE'), 'customer_id'),
      total_logs: monthLogs.length
    };

    // 活跃客户 Top 5（本月联系次数）
    const contactCount = {};
    monthLogs.forEach(l => {
      if (l.customer_id) contactCount[l.customer_id] = (contactCount[l.customer_id] || 0) + 1;
    });
    const custMap = {};
    custs.forEach(c => custMap[c.customer_id] = c);

    const top5 = Object.entries(contactCount)
      .sort((a,b) => b[1]-a[1])
      .slice(0, 5)
      .map(([id, cnt]) => {
        const c = custMap[id] || {};
        const company = getField(c, 'company', '公司') || id;
        const contact = getField(c, 'contact_person', '联系人') || '—';
        return `
          <tr>
            <td class="td-date">${id}</td>
            <td>${company}</td>
            <td>${contact}</td>
            <td class="td-num">${cnt}</td>
          </tr>
        `;
      }).join('');

    el.innerHTML = `
      <div class="funnel-grid" style="margin-bottom:20px;">
        <div class="funnel-card fc-contacted">
          <div class="fc-label">本月触达客户</div>
          <div class="fc-num">${monthStats.contacted}</div>
        </div>
        <div class="funnel-card fc-replied">
          <div class="fc-label">有回复</div>
          <div class="fc-num">${monthStats.replied}</div>
        </div>
        <div class="funnel-card fc-rfq">
          <div class="fc-label">收到 RFQ</div>
          <div class="fc-num">${monthStats.rfq}</div>
        </div>
        <div class="funnel-card fc-quoted">
          <div class="fc-label">已报价</div>
          <div class="fc-num">${monthStats.quoted}</div>
        </div>
        <div class="funnel-card fc-demand">
          <div class="fc-label">总沟通记录</div>
          <div class="fc-num">${monthStats.total_logs}</div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">本月活跃客户 Top 5</div>
        <table class="stat-table">
          <thead>
            <tr>
              <th>ID</th><th>公司</th><th>联系人</th><th style="text-align:right">记录次数</th>
            </tr>
          </thead>
          <tbody>
            ${top5 || '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:20px;">本月暂无数据</td></tr>'}
          </tbody>
        </table>
      </div>
    `;
  } catch (err) {
    el.innerHTML = `<div class="empty-state">加载失败: ${err.message}</div>`;
  }
}

// ── 工具函数 ────────────────────────────────────────────
function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getField(row, ...keys) {
  for (const key of keys) {
    if (row[key] !== undefined && row[key] !== null && row[key] !== '') return String(row[key]);
  }
  return '';
}

function normalizeDate(value) {
  if (!value) return '';
  const text = String(value);
  if (/^\d{4}-\d{2}-\d{2}/.test(text)) return text.slice(0, 10);
  const parsed = new Date(text);
  return Number.isNaN(parsed.getTime()) ? text : formatDate(parsed);
}

function getLast7Days() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(formatDate(d));
  }
  return days;
}

function computeDayStats(logs, date) {
  const dayLogs = logs.filter(l => normalizeDate(l.log_date) === date);
  const unique = (arr, key) => [...new Set(arr.map(r => r[key]).filter(Boolean))].length;
  return {
    contacted: unique(dayLogs.filter(l => l.action_type === 'SENT'), 'customer_id'),
    replied:   unique(dayLogs.filter(l => l.has_reply === 'TRUE'), 'customer_id'),
    rfq:       unique(dayLogs.filter(l => l.has_rfq === 'TRUE'), 'customer_id'),
  };
}
</script>
